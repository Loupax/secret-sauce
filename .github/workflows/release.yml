name: Release

on:
  push:
    branches:
      - release-pipeline
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build CLI
        run: |
          mkdir -p build
          if [ "${{ matrix.platform }}" = "windows" ]; then
            go build -o build/sauce.exe ./cmd/sauce
          else
            go build -o build/sauce ./cmd/sauce
          fi
        shell: bash

      - name: Build GUI
        uses: wailsapp/wails-build-action@v2
        with:
          build-name: sauce-gui
          build-platform: ${{ matrix.platform }}
          project-dir: gui
          go-version: '1.25.x'

      - name: Package Assets
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            mv gui/build/bin/sauce-gui.exe build/
            cd build && zip -r ../secret-sauce-${{ matrix.platform }}.zip .
          else
            mv gui/build/bin/sauce-gui build/
            cd build && tar -czf ../secret-sauce-${{ matrix.platform }}.tar.gz .
          fi
        shell: bash

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            secret-sauce-${{ matrix.platform }}.zip
            secret-sauce-${{ matrix.platform }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
