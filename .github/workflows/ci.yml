name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Run Tests
        run: go test -v ./...

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Verify CLI Build
        run: |
          mkdir -p build
          if [ "${{ matrix.platform }}" = "windows" ]; then
            go build -o build/sauce.exe ./cmd/sauce
          else
            go build -o build/sauce ./cmd/sauce
          fi
        shell: bash

      - name: Verify GUI Build
        run: |
          cd gui
          if [ "${{ matrix.platform }}" = "linux" ]; then
            wails build -tags webkit2_41 -o sauce-gui
          else
            wails build -o sauce-gui.exe
          fi
        shell: bash
